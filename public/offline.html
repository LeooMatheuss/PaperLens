<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PaperLens offline</title>
    <style>
      :root { color-scheme: dark; font-family: Arial, sans-serif; background: #09090b; color: #f5f5f5; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top, #1f2937, #09090b 55%); }
      main { max-width: 420px; padding: 24px; text-align: center; }
      h1 { font-size: 1.8rem; margin-bottom: 12px; }
      p { color: #d4d4d8; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <h1>Você está offline</h1>
      <p>PaperLens está usando a versão em cache. Reabra o app quando a conexão voltar para sincronizar os PDFs e a biblioteca.</p>
    </main>
  </body>
</html>
